<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniKodi - Reproductor Multimedia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #4ecca3;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-bar {
      flex: 1;
      max-width: 500px;
      margin: 0 2rem;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: background 0.3s;
    }

    .search-bar input:focus {
      background: rgba(255, 255, 255, 0.15);
    }

    .search-bar input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .nav-buttons {
      display: flex;
      gap: 1rem;
    }

    .nav-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: rgba(78, 204, 163, 0.2);
      color: #4ecca3;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .nav-btn:hover, .nav-btn.active {
      background: #4ecca3;
      color: #1a1a2e;
    }

    /* Main Content */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    h2 {
      margin-bottom: 1.5rem;
      color: #4ecca3;
      font-size: 1.5rem;
    }

    /* Grid de Mods */
    .mods-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .mod-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.3s, background 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mod-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.08);
    }

    .mod-card h3 {
      margin-bottom: 0.5rem;
      color: #4ecca3;
    }

    .mod-card .version {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.5rem;
    }

    .mod-card .type {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(78, 204, 163, 0.2);
      color: #4ecca3;
      border-radius: 15px;
      font-size: 0.75rem;
      margin-bottom: 1rem;
    }

    .mod-card .size {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .mod-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #4ecca3;
      color: #1a1a2e;
    }

    .btn-primary:hover {
      background: #3db892;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: #e74c3c;
      color: #fff;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    /* Player Section */
    .player-container {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }

    .player-placeholder {
      width: 100%;
      height: 400px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      border: 2px dashed rgba(255, 255, 255, 0.2);
    }

    .player-placeholder p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.2rem;
    }

    .player-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Torrent Section */
    .torrent-input {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
      resize: vertical;
    }

    .torrent-progress {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 1rem 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ecca3, #3db892);
      transition: width 0.3s;
      border-radius: 10px;
    }

    .torrent-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4ecca3;
    }

    .stat-label {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.3rem;
    }

    /* Favorites */
    .favorites-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .favorite-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #4ecca3;
    }

    .favorite-info h4 {
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .favorite-info p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4ecca3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Notifications */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 1rem 2rem;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }

    .notification.success {
      background: #4ecca3;
    }

    .notification.error {
      background: #e74c3c;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="logo">
        <span>🎬</span> MiniKodi
      </div>
      
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar mods, películas, series...">
      </div>
      
      <nav class="nav-buttons">
        <button class="nav-btn active" data-section="home">Inicio</button>
        <button class="nav-btn" data-section="player">Reproductor</button>
        <button class="nav-btn" data-section="torrent">Torrent</button>
        <button class="nav-btn" data-section="favorites">Favoritos</button>
      </nav>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Home / Mods Section -->
      <section id="home" class="section active">
        <h2>📦 Mods Disponibles</h2>
        <div id="modsGrid" class="mods-grid">
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </div>
      </section>

      <!-- Player Section -->
      <section id="player" class="section">
        <h2>🎥 Reproductor</h2>
        <div class="player-container">
          <div class="player-placeholder">
            <p>Selecciona un archivo para reproducir</p>
          </div>
          <div class="player-controls">
            <button class="btn btn-primary" onclick="selectAndPlay()">📁 Abrir Archivo Local</button>
            <button class="btn btn-secondary" onclick="playFromFavorites()">▶️ Reproducir desde Favoritos</button>
          </div>
        </div>
      </section>

      <!-- Torrent Section -->
      <section id="torrent" class="section">
        <h2>🌐 Descarga Torrent</h2>
        <div class="player-container">
          <textarea 
            id="magnetInput" 
            class="torrent-input" 
            rows="3" 
            placeholder="Pega aquí tu enlace magnet o URL de torrent..."
          ></textarea>
          <div class="player-controls">
            <button class="btn btn-primary" onclick="startTorrent()">⬇️ Iniciar Descarga</button>
            <button class="btn btn-danger" onclick="stopTorrent()">⏹️ Detener</button>
          </div>
          
          <div id="torrentProgress" class="torrent-progress" style="display: none;">
            <h3>Progreso de Descarga</h3>
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <div class="torrent-stats">
              <div class="stat-item">
                <div id="progressValue" class="stat-value">0%</div>
                <div class="stat-label">Completado</div>
              </div>
              <div class="stat-item">
                <div id="downloadSpeed" class="stat-value">0 KB/s</div>
                <div class="stat-label">Velocidad Bajada</div>
              </div>
              <div class="stat-item">
                <div id="uploadSpeed" class="stat-value">0 KB/s</div>
                <div class="stat-label">Velocidad Subida</div>
              </div>
              <div class="stat-item">
                <div id="numPeers" class="stat-value">0</div>
                <div class="stat-label">Peers</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Favorites Section -->
      <section id="favorites" class="section">
        <h2>⭐ Favoritos</h2>
        <div id="favoritesList" class="favorites-list">
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ==================== NAVIGATION ====================
    const navButtons = document.querySelectorAll('.nav-btn');
    const sections = document.querySelectorAll('.section');

    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const sectionId = btn.dataset.section;
        
        navButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        sections.forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
      });
    });

    // ==================== NOTIFICATIONS ====================
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }

    // ==================== LOAD MODS ====================
    async function loadMods(query = '') {
      const modsGrid = document.getElementById('modsGrid');
      modsGrid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      try {
        const mods = await window.minikodiAPI.searchMods(query);
        
        if (mods.length === 0) {
          modsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.6);">No se encontraron mods</p>';
          return;
        }
        
        modsGrid.innerHTML = mods.map(mod => `
          <div class="mod-card">
            <h3>${mod.name}</h3>
            <div class="version">v${mod.version}</div>
            <span class="type">${mod.type}</span>
            <div class="size">${mod.size}</div>
            <div class="mod-actions">
              <button class="btn btn-primary" onclick="installMod('${mod.id}', '${mod.name}', '${mod.version}')">
                ⬇️ Instalar
              </button>
              <button class="btn btn-secondary" onclick="addToFavorites('${mod.id}', '${mod.name}', 'mod')">
                ⭐ Favorito
              </button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading mods:', error);
        modsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #e74c3c;">Error al cargar mods</p>';
      }
    }

    // ==================== INSTALL MOD ====================
    async function installMod(modId, modName, modVersion) {
      try {
        const result = await window.minikodiAPI.installMod('', {
          id: modId,
          name: modName,
          version: modVersion
        });
        
        if (result.success) {
          showNotification(`✅ ${modName} instalado correctamente`);
        }
      } catch (error) {
        console.error('Error installing mod:', error);
        showNotification(`❌ Error al instalar: ${error.message}`, 'error');
      }
    }

    // ==================== FAVORITES ====================
    async function loadFavorites() {
      const favoritesList = document.getElementById('favoritesList');
      
      try {
        const favorites = await window.minikodiAPI.getFavorites();
        
        if (favorites.length === 0) {
          favoritesList.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.6);">No hay favoritos guardados</p>';
          return;
        }
        
        favoritesList.innerHTML = favorites.map(fav => `
          <div class="favorite-item">
            <div class="favorite-info">
              <h4>${fav.name}</h4>
              <p>${fav.type.toUpperCase()} • ID: ${fav.id}</p>
            </div>
            <div>
              <button class="btn btn-primary" onclick="playFavorite('${fav.id}')">▶️ Reproducir</button>
              <button class="btn btn-danger" onclick="removeFavorite('${fav.id}')">🗑️ Eliminar</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading favorites:', error);
        favoritesList.innerHTML = '<p style="text-align: center; color: #e74c3c;">Error al cargar favoritos</p>';
      }
    }

    async function addToFavorites(id, name, type) {
      try {
        await window.minikodiAPI.addFavorite({ id, name, type });
        showNotification('✅ Añadido a favoritos');
      } catch (error) {
        showNotification(`❌ Error: ${error.message}`, 'error');
      }
    }

    async function removeFavorite(itemId) {
      try {
        await window.minikodiAPI.removeFavorite(itemId);
        loadFavorites();
        showNotification('✅ Eliminado de favoritos');
      } catch (error) {
        showNotification(`❌ Error: ${error.message}`, 'error');
      }
    }

    // ==================== PLAYER ====================
    async function selectAndPlay() {
      try {
        const result = await window.minikodiAPI.selectFile();
        if (result.success) {
          await window.minikodiAPI.playMedia(result.path);
          showNotification(`🎬 Reproduciendo: ${result.path.split('\\').pop() || result.path.split('/').pop()}`);
          
          // Actualizar UI del player
          const placeholder = document.querySelector('.player-placeholder');
          placeholder.innerHTML = `<p style="color: #4ecca3;">▶️ Reproduciendo: ${result.path.split('\\').pop() || result.path.split('/').pop()}</p>`;
        }
      } catch (error) {
        showNotification(`❌ Error: ${error.message}`, 'error');
      }
    }

    async function playFromFavorites() {
      const favorites = await window.minikodiAPI.getFavorites();
      if (favorites.length === 0) {
        showNotification('❌ No hay favoritos para reproducir', 'error');
        return;
      }
      
      // Reproducir el primero (en producción mostrar selector)
      const firstFav = favorites[0];
      showNotification(`▶️ Reproduciendo desde favoritos: ${firstFav.name}`);
    }

    async function playFavorite(favId) {
      const favorites = await window.minikodiAPI.getFavorites();
      const fav = favorites.find(f => f.id === favId);
      if (fav) {
        showNotification(`▶️ Reproduciendo: ${fav.name}`);
        // Navegar a sección player
        document.querySelector('[data-section="player"]').click();
      }
    }

    // ==================== TORRENT ====================
    let currentTorrent = null;

    async function startTorrent() {
      const magnetUri = document.getElementById('magnetInput').value.trim();
      
      if (!magnetUri) {
        showNotification('❌ Ingresa un enlace magnet válido', 'error');
        return;
      }

      try {
        document.getElementById('torrentProgress').style.display = 'block';
        
        window.minikodiAPI.onTorrentProgress((data) => {
          document.getElementById('progressFill').style.width = `${data.progress}%`;
          document.getElementById('progressValue').textContent = `${data.progress.toFixed(1)}%`;
          document.getElementById('downloadSpeed').textContent = formatSpeed(data.downloadSpeed);
          document.getElementById('uploadSpeed').textContent = formatSpeed(data.uploadSpeed);
          document.getElementById('numPeers').textContent = data.numPeers;
        });

        const result = await window.minikodiAPI.startTorrent(magnetUri);
        
        if (result.success) {
          showNotification('✅ Descarga completada');
          currentTorrent = result;
        }
      } catch (error) {
        showNotification(`❌ Error: ${error.message}`, 'error');
        document.getElementById('torrentProgress').style.display = 'none';
      }
    }

    async function stopTorrent() {
      if (currentTorrent) {
        try {
          await window.minikodiAPI.stopTorrent(currentTorrent.infoHash);
          showNotification('⏹️ Descarga detenida');
          document.getElementById('torrentProgress').style.display = 'none';
        } catch (error) {
          showNotification(`❌ Error: ${error.message}`, 'error');
        }
      } else {
        showNotification('❌ No hay descargas activas', 'error');
      }
    }

    function formatSpeed(bytesPerSecond) {
      if (bytesPerSecond < 1024) return `${bytesPerSecond} B/s`;
      if (bytesPerSecond < 1024 * 1024) return `${(bytesPerSecond / 1024).toFixed(1)} KB/s`;
      return `${(bytesPerSecond / (1024 * 1024)).toFixed(1)} MB/s`;
    }

    // ==================== SEARCH ====================
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        loadMods(e.target.value);
      }, 300);
    });

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', () => {
      loadMods();
      loadFavorites();
    });
  </script>
</body>
</html>
